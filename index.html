<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock paper scissor GAME</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">  
  <div>
   <h1 class="neon-text">Rock Paper Scissor</h1> 
  </div>
   <div class="choices">
   <div class="choice" id="rock">
   <img src="rock.png"/>
   </div>
   <div class="choice" id="paper">
   <img src="./paper.png"/>
   </div>
   <div class="choice" id="scissor">
   <img src="./scissor.png" class="card"/>
   </div>
   </div>

   <div class="score-board">
    <div class="score">
      <p id="user-score">0</p>
      <p>you</p>
    </div>
    <div class="score">
      <p id="comp-score">0</p>
      <p>computer</p>
    </div>
    </div>

   <div class="msg-contain">
    <p id="msg">play your move</p>
   </div>
</div>
   <script src="first.js"></script> 
</body>
</html>
